site_name: AirSense ML
site_description: Production-grade Air Quality Index prediction system for Delhi
site_author: Chitrank Agnihoti
site_url: https://chitrank2050.github.io/airsense-ml
repo_url: https://github.com/chitrank2050/airsense-ml
repo_name: chitrank2050/airsense-ml
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting_started/installation.md
    - Quickstart: getting_started/quickstart.md
  - Architecture:
    - Overview: architecture/overview.md
    - Project Structure: architecture/structure.md
  - API Reference:
    - Endpoints: api/endpoints.md
  - ML Pipeline:
    - Data Pipeline: ml/data_pipeline.md
    - Feature Engineering: ml/feature_engineering.md
    - Model Training: ml/training.md
    - Evaluation Metrics: ml/metrics.md
    - Orchestration: development/orchestration.md
  - Data:
    - Sources: data/sources.md
  - Development:
    - Tech Stack: development/tech_stack.md
    - Continuous Integration: development/ci.md
    - Testing: development/testing.md
    - Development Log: development/log.md
    - Pre-commit Hooks: development/pre_commit.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chitrank2050
      name: GitHub
    - icon: fontawesome/solid/globe
      link: https://chitrankagnihotri.com/
      name: Portfolio
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/chitrank-agnihotri/
      name: LinkedIn

copyright: Copyright &copy; 2026 Chitrank Agnihoti