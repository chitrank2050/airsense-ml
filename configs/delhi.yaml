dataset:
  filepath: data/raw/kaggle_delhi_ncr_aqi_dataset.csv
  target: aqi

leakage_cols:
  - pm25
  - pm10
  - no2
  - so2
  - co
  - o3
  - aqi_category
  - datetime
  - date
  - year
  - city

features:
  numerical:
    - temperature
    - humidity
    - wind_speed
    - visibility
    - latitude
    - longitude
    - dow_sin
    - dow_cos
    - hour_sin
    - hour_cos
    - month_sin
    - month_cos

  categorical:
    - season
    - station

  ordinal:
    - day
    - is_weekend
    - aqi_capped

log_transform_target: true