training:
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  cv_folds: 5
  shuffle: true

models:
  linear_regression:
    enabled: true
    params: {}

  ridge:
    enabled: true
    params:
      alpha: 1.0

  lasso:
    enabled: true
    params:
      alpha: 0.1
      max_iter: 2000

  elastic_net:
    enabled: true
    params:
      alpha: 0.1
      l1_ratio: 0.5
      max_iter: 2000

  random_forest:
    enabled: true
    params:
      n_estimators: 200
      max_depth: 15
      min_samples_split: 5
      min_samples_leaf: 2
      n_jobs: -1
      random_state: 42

  xgboost:
    enabled: true
    params:
      n_estimators: 300
      learning_rate: 0.05
      max_depth: 6
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
      n_jobs: -1

  lightgbm:
    enabled: true
    params:
      n_estimators: 300
      learning_rate: 0.05
      max_depth: 6
      num_leaves: 31
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42
      n_jobs: -1
      verbose: -1

evaluation:
  primary_metric: rmse
  metrics:
    - rmse
    - rmsle
    - mae
    - r2

mlflow:
  experiment_name: airsense-aqi-regression
  tracking_uri: sqlite:///mlruns.db

artifacts:
  model_dir: models/
  best_model_name: best_model.pkl